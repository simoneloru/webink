<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="CrossInk e-reader in the browser (client-side only)" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>CrossInk (Web)</title>
  <style>
    /*
      X4 panel is 800×480. In-UI button hints use ~40px of 480 (~8.3%) height
      and side hints ~30px width. Chrome below mirrors that scale.
    */
    :root {
      --bg: #0e0e0e;
      --bezel: #1c1c1c;
      --btn: #2a2a2a;
      --btn-active: #3d3d3d;
      --btn-border: #444;
      --ink: #e8e4d9;
      --text: #e8e8e8;
      --muted: #888;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --front-h: 40px;   /* matches buttonHintsHeight on device themes */
      --side-w: 30px;    /* matches sideButtonHintsWidth */
      --gap: 3px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    header {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.35rem 0.55rem;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      font-size: 0.82rem;
    }
    header strong { letter-spacing: 0.02em; font-size: 0.9rem; }
    header .tag { opacity: 0.5; font-size: 0.72rem; }
    header button, header label.btn {
      background: #1e1e1e;
      color: var(--text);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.28rem 0.55rem;
      cursor: pointer;
      font-size: 0.78rem;
    }
    #status {
      opacity: 0.8;
      font-size: 0.72rem;
      margin-left: auto;
      max-width: 36ch;
      text-align: right;
    }

    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0.35rem 0.4rem calc(0.35rem + var(--safe-b));
      gap: var(--gap);
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
    }

    /* Device body: e-ink + thin side rails (like physical bezel keys) */
    #device {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr) var(--side-w);
      gap: var(--gap);
      background: var(--bezel);
      border-radius: 8px;
      padding: var(--gap);
      box-shadow: inset 0 0 0 1px #0008, 0 6px 20px #000a;
    }

    #canvas-wrap {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
    }

    #canvas {
      background: var(--ink);
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      image-rendering: pixelated;
      touch-action: none;
      outline: none;
    }

    .side-col {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      min-width: 0;
    }
    .side-col .hw-btn { flex: 1; }

    /* Front face: 5 compact keys, ~40px tall like on-device hints */
    #front-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--gap);
      height: var(--front-h);
      flex-shrink: 0;
    }

    .hw-btn {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: linear-gradient(180deg, #333, var(--btn));
      color: var(--text);
      border-radius: 5px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      margin: 0;
      font-size: 0.7rem;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      min-height: 0;
      box-shadow: inset 0 1px 0 #ffffff14;
    }
    .hw-btn:active, .hw-btn.is-down {
      background: var(--btn-active);
      box-shadow: inset 0 1px 2px #0008;
    }
    .hw-btn .ico { font-size: 0.75rem; opacity: 0.95; }
    .hw-btn .lbl {
      font-size: 0.48rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.65;
    }
    .hw-btn.power { background: linear-gradient(180deg, #3a3a3a, #222); }
    .hw-btn.back { background: linear-gradient(180deg, #35322e, #24201c); }

    .hint {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      padding: 0 0.25rem;
      flex-shrink: 0;
      line-height: 1.3;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000c;
      z-index: 20;
      padding: 1.5rem;
      text-align: center;
    }
    #overlay.hidden { display: none; }
    #overlay p { max-width: 36ch; line-height: 1.45; }

    @media (min-width: 700px) {
      :root {
        /* Scale chrome slightly when canvas is large, keep ~8% of 480-ish */
        --front-h: 44px;
        --side-w: 32px;
      }
    }
    @media (max-width: 420px) {
      :root {
        --front-h: 38px;
        --side-w: 28px;
      }
      .hw-btn .lbl { display: none; } /* icons only on very small phones */
      .hw-btn .ico { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <strong>CrossInk</strong>
    <span class="tag">web</span>
    <label class="btn">
      Open EPUB
      <input id="epub" type="file" accept=".epub,application/epub+zip" hidden />
    </label>
    <button id="sync" type="button" title="Write virtual SD to IndexedDB">Save</button>
    <button id="install" type="button" hidden>Install</button>
    <span id="status">Loading…</span>
  </header>

  <div id="stage">
    <div id="device">
      <div class="side-col" aria-label="Side buttons">
        <button type="button" class="hw-btn" data-key="ArrowUp" data-code="ArrowUp" data-key-code="38" title="Page back">
          <span class="ico">▲</span><span class="lbl">Prev</span>
        </button>
        <button type="button" class="hw-btn" data-key="ArrowDown" data-code="ArrowDown" data-key-code="40" title="Page forward">
          <span class="ico">▼</span><span class="lbl">Next</span>
        </button>
      </div>

      <div id="canvas-wrap">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0" aria-label="E-ink display"></canvas>
      </div>

      <div class="side-col" aria-label="Side buttons right">
        <button type="button" class="hw-btn" data-key="ArrowUp" data-code="ArrowUp" data-key-code="38" title="Page back">
          <span class="ico">▲</span><span class="lbl">Prev</span>
        </button>
        <button type="button" class="hw-btn" data-key="ArrowDown" data-code="ArrowDown" data-key-code="40" title="Page forward">
          <span class="ico">▼</span><span class="lbl">Next</span>
        </button>
      </div>
    </div>

    <div id="front-bar" aria-label="Front buttons">
      <button type="button" class="hw-btn" data-key="ArrowLeft" data-code="ArrowLeft" data-key-code="37" title="Left">
        <span class="ico">◀</span><span class="lbl">Left</span>
      </button>
      <button type="button" class="hw-btn" data-key="Enter" data-code="Enter" data-key-code="13" title="OK">
        <span class="ico">●</span><span class="lbl">OK</span>
      </button>
      <button type="button" class="hw-btn" data-key="ArrowRight" data-code="ArrowRight" data-key-code="39" title="Right">
        <span class="ico">▶</span><span class="lbl">Right</span>
      </button>
      <button type="button" class="hw-btn back" data-key="Escape" data-code="Escape" data-key-code="27" title="Back">
        <span class="ico">⎋</span><span class="lbl">Back</span>
      </button>
      <button type="button" class="hw-btn power" data-key="p" data-code="KeyP" data-key-code="80" title="Power">
        <span class="ico">⏻</span><span class="lbl">Pwr</span>
      </button>
    </div>

    <p class="hint">Books stay on this device. Front bar ≈ 40px (same as on-device button hints).</p>
  </div>

  <div id="overlay"><p id="overlay-msg">Loading CrossInk…</p></div>
  <script type="module" src="app.js"></script>
</body>
</html>
