name: Build CrossInk Wasm & Deploy Pages

# Deploy on:
#   - version tags (v0.1.0, v1.2.3, …)  ← release path
#   - pushes to main                     ← continuous site updates
#   - manual run from Actions UI
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 python3-pip python3-yaml

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.6
          actions-cache-folder: emsdk-cache

      - name: Verify emcc
        run: |
          emcc -v
          which emcmake
          cmake --version
          ninja --version

      - name: Resolve build version label
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "label=web-0.1.0-dev" >> "$GITHUB_OUTPUT"
          fi
          echo "Building as: $(cat "$GITHUB_OUTPUT" | sed -n 's/label=//p')"

      - name: Generate icons
        run: python3 scripts/gen_icons.py

      - name: Patch simulator + CrossInk for Emscripten
        run: |
          ./scripts/patch_simulator.sh
          ./scripts/patch_crossink_emscripten.sh

      - name: Generate CrossInk i18n / web assets
        working-directory: vendor/CrossInk
        run: |
          python3 scripts/gen_i18n.py
          python3 scripts/build_web.py || true
          test -f lib/I18n/I18nKeys.h

      - name: Configure & build
        env:
          WEBINK_VERSION: ${{ steps.ver.outputs.label }}
        run: |
          set -euo pipefail
          emcmake cmake -S wasm -B wasm/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWEBINK_VERSION="${WEBINK_VERSION}"
          cmake --build wasm/build --parallel 2>&1 | tee build.log
          test -f www/crossink.js
          test -f www/crossink.wasm
          ls -lh www/crossink.js www/crossink.wasm

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R www/* _site/
          rm -f _site/.DS_Store
          test -f _site/crossink.js
          test -f _site/crossink.wasm
          test -f _site/index.html
          # Tiny stamp for debugging which ref is live
          {
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > _site/build-info.txt
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
