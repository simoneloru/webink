name: Build CrossInk Wasm & Deploy Pages

# Deploy only on version tags (and manual runs). Always full Wasm build for
# reliability (shell-only reuse can be re-added once ST Wasm is stably live).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Version label
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
          echo "Building version: $(sed -n 's/version=//p' "$GITHUB_OUTPUT")"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 python3-pip python3-yaml ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: emscripten-${{ runner.os }}-wasm-st
          max-size: 2G

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.6
          actions-cache-folder: emsdk-cache

      - name: Patch + i18n + full Wasm build
        env:
          WEBINK_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          python3 scripts/gen_icons.py
          ./scripts/patch_simulator.sh
          ./scripts/patch_crossink_emscripten.sh
          (
            cd vendor/CrossInk
            python3 scripts/gen_i18n.py
            python3 scripts/build_web.py || true
            test -f lib/I18n/I18nKeys.h
          )
          # Never reuse wasm/build cache: emsdk path is under a new /tmp each run
          rm -rf wasm/build
          emcmake cmake -S wasm -B wasm/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWEBINK_VERSION="${WEBINK_VERSION}"
          cmake --build wasm/build --parallel
          test -f www/crossink.js && test -f www/crossink.wasm
          # Single-thread build must not require SharedArrayBuffer
          if grep -q SharedArrayBuffer www/crossink.js; then
            echo "ERROR: build still references SharedArrayBuffer (pthread?)"
            exit 1
          fi
          ls -lh www/crossink.js www/crossink.wasm
          ccache -s || true

      - name: Ensure icons
        run: |
          if [[ ! -f www/icons/icon-192.png ]]; then
            python3 scripts/gen_icons.py
          fi
          if [[ ! -f www/favicon.ico ]]; then
            cp www/icons/icon-192.png www/favicon.ico
          fi

      - name: Assemble _site
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R www/* _site/
          rm -f _site/.DS_Store
          test -f _site/crossink.js
          test -f _site/crossink.wasm
          test -f _site/index.html
          test -f _site/app.js
          test -f _site/sw.js
          # Sanity: compact chrome + no COI gate (single-thread)
          grep -q 'front-h' _site/index.html
          if grep -q ensureCrossOriginIsolated _site/app.js; then
            echo "ERROR: app.js still gates on COI (should be single-thread)"
            exit 1
          fi
          if grep -q SharedArrayBuffer _site/crossink.js; then
            echo "ERROR: crossink.js requires SharedArrayBuffer"
            exit 1
          fi
          {
            echo "version=${VERSION}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "wasm_build=true"
            echo "plan=always_full"
            echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > _site/build-info.txt
          touch _site/.nojekyll
          cat _site/build-info.txt
          ls -lh _site/crossink.js _site/crossink.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
